  };
  return map[tone] || map.slate;
};

function Badge({ status }) {
  const tone = STATUS_TONE[status] || "slate";
  const s = toneStyle(tone);
  return (
    <span className="inline-flex items-center rounded-full px-2.5 py-0.5 text-xs font-semibold whitespace-nowrap"
      style={{ background: s.bg, color: s.fg }}>
      {status}
    </span>
  );
}

function Btn({ children, onClick, variant = "primary", size = "md", className = "", type, icon: Icon, disabled }) {
  const sizes = { sm: "px-2.5 py-1.5 text-xs", md: "px-3.5 py-2 text-sm", lg: "px-5 py-2.5 text-sm" };
  const base = "inline-flex items-center justify-center gap-1.5 rounded-lg font-semibold transition-colors disabled:opacity-50 disabled:cursor-not-allowed";
  const styles = {
    primary: { background: C.ink, color: "#fff" },
    gold: { background: C.gold, color: "#fff" },
    ghost: { background: "#fff", color: C.text, border: `1px solid ${C.line}` },
    soft: { background: C.slateBg, color: C.text },
    danger: { background: C.redBg, color: C.red },
    goldSoft: { background: C.goldSoft, color: C.gold, border: `1px solid ${C.goldLine}` },
  };
  return (
    <button type={type || "button"} onClick={onClick} disabled={disabled}
      className={`${base} ${sizes[size]} ${className}`} style={styles[variant]}>
      {Icon && <Icon size={size === "sm" ? 13 : 15} />} {children}
    </button>
  );
}

function StatCard({ label, value, icon: Icon, tone = "ink", onClick, active }) {
  const tones = {
    ink: C.ink, gold: C.gold, green: C.green, red: C.red,
    amber: C.amber, blue: C.blue, slate: C.slate,
  };
  const accent = tones[tone] || C.ink;
  return (
    <button onClick={onClick}
      className="text-left rounded-2xl p-4 transition-shadow hover:shadow-md"
      style={{ background: C.card, border: `1px solid ${active ? accent : C.line}`, cursor: onClick ? "pointer" : "default" }}>
      <div className="flex items-start justify-between">
        <div>
          <div className="text-2xl font-bold leading-none" style={{ color: accent, fontFamily: SANS }}>{value}</div>
          <div className="mt-1.5 text-xs font-medium" style={{ color: C.muted }}>{label}</div>
        </div>
        <div className="grid place-items-center rounded-lg" style={{ width: 34, height: 34, background: C.bg }}>
          <Icon size={17} style={{ color: accent }} />
        </div>
      </div>
    </button>
  );
}

  );
}

const ALL_STATUSES = ["New", "Answered", "No answer", "Busy", "Voicemail", "Interested", "Wants catalog", "Wants callback", "Requested price list", "Requested email", "Not interested", "Do not call", "Wrong number", "Call failed"];

function ScorePill({ score }) {
  const tone = score >= 75 ? C.green : score >= 50 ? C.amber : C.red;
  const bg = score >= 75 ? C.greenBg : score >= 50 ? C.amberBg : C.redBg;
  return <span className="inline-flex items-center rounded-md px-2 py-0.5 text-xs font-bold" style={{ background: bg, color: tone }}>{score}</span>;
}

function LeadTable({ leads, openLead, onCall, onUpdate, onNote }) {
  const [q, setQ] = useState("");
  const [filter, setFilter] = useState("All");
  const filtered = leads.filter((l) => {
    const matchQ = (l.name + l.phone + l.address).toLowerCase().includes(q.toLowerCase());
    const matchF = filter === "All" || (filter === "Do not call" ? l.dnc : l.status === filter);
    return matchQ && matchF;
  });
  const quickFilters = ["All", "Interested", "Wants catalog", "Wants callback", "Not interested", "Do not call"];
  return (
    <div>
      <SectionTitle title="Leads" sub={`${leads.length} jewelry store leads`}
        right={<Btn variant="gold" icon={Plus} onClick={() => onUpdate("__add__")}>Add lead</Btn>} />
      <Card pad={false}>
        <div className="flex flex-wrap items-center gap-2 px-4 py-3" style={{ borderBottom: `1px solid ${C.line}` }}>
          <div className="relative flex-1" style={{ minWidth: 200 }}>
            <Search size={15} style={{ color: C.faint, position: "absolute", left: 10, top: 9 }} />
            <input value={q} onChange={(e) => setQ(e.target.value)} placeholder="Search store, phone, address"
              className="w-full rounded-lg pl-8 pr-3 py-2 text-sm outline-none" style={inputStyle} />
          </div>
          <div className="flex items-center gap-1.5 flex-wrap">
            {quickFilters.map((f) => (
              <button key={f} onClick={() => setFilter(f)} className="rounded-lg px-2.5 py-1.5 text-xs font-semibold transition-colors"
                style={{ background: filter === f ? C.ink : "#fff", color: filter === f ? "#fff" : C.muted, border: `1px solid ${filter === f ? C.ink : C.line}` }}>
                {f}
              </button>
            ))}
          </div>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm" style={{ minWidth: 940 }}>
            <thead>
              <tr style={{ color: C.muted }}>
                {["Store", "Phone", "Source", "Status", "Last call", "Next follow-up", "Score", ""].map((h) => (
                  <th key={h} className="text-left font-semibold px-4 py-2.5 text-xs uppercase tracking-wide" style={{ borderBottom: `1px solid ${C.line}` }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filtered.map((l) => (
                <tr key={l.id} className="hover:bg-stone-50 transition-colors" style={{ borderBottom: `1px solid ${C.line}` }}>
                  <td className="px-4 py-3">
                    <button onClick={() => openLead(l.id)} className="text-left">
                      <div className="font-semibold" style={{ color: C.text }}>{l.name}</div>
                      <div className="text-xs truncate" style={{ color: C.faint, maxWidth: 220, overflow: "hidden", textOverflow: "ellipsis" }}>{l.address}</div>
                    </button>
                  </td>
                  <td className="px-4 py-3" style={{ color: C.text }}>{l.phone}</td>
                  <td className="px-4 py-3"><span className="text-xs" style={{ color: C.muted }}>{l.source}</span></td>
                  <td className="px-4 py-3">{l.dnc ? <Badge status="Do not call" /> : <Badge status={l.status} />}</td>
                  <td className="px-4 py-3 text-xs" style={{ color: C.muted }}>{l.lastCall || "—"}</td>
                  <td className="px-4 py-3 text-xs" style={{ color: l.nextFollowUp ? C.amber : C.faint, fontWeight: l.nextFollowUp ? 600 : 400 }}>{l.nextFollowUp || "—"}</td>
                  <td className="px-4 py-3"><ScorePill score={l.score} /></td>
                  <td className="px-4 py-3">
                    <div className="flex items-center justify-end gap-1">
                      <button title="Start AI call" disabled={l.dnc} onClick={() => onCall(l)} className="grid place-items-center rounded-md disabled:opacity-30" style={{ width: 30, height: 30, background: C.goldSoft }}>
                        <Phone size={14} style={{ color: C.gold }} />
                      </button>
                      <button title="View details" onClick={() => openLead(l.id)} className="grid place-items-center rounded-md" style={{ width: 30, height: 30, background: C.bg }}>
                        <ChevronRight size={15} style={{ color: C.muted }} />

                  </td>
                </tr>
              ))}

          </table>
          {filtered.length === 0 && <p className="text-center py-10 text-sm" style={{ color: C.faint }}>No leads match this filter.</p>}

function LeadDetails({ lead, calls, onClose, onCall, onUpdate, onCatalog }) {
  const [tab, setTab] = useState("overview");
  const [note, setNote] = useState("");
  if (!lead) return null;
  const leadCalls = calls.filter((c) => c.leadId === lead.id);
  const tabs = [["overview", "Overview"], ["calls", "Calls"], ["comms", "Email / SMS"], ["followup", "Follow-up"]];
  const info = [
    ["Phone", lead.phone], ["Email", lead.email || "Not found yet"], ["Website", lead.website || "—"],
    ["Address", lead.address], ["Google rating", lead.rating ? `${lead.rating} / 5` : "—"],
    ["Lead source", lead.source], ["Catalog", lead.catalog],
  ];
  return (
    <Modal open={!!lead} onClose={onClose} title={lead.name} width="max-w-3xl">
      <div className="flex flex-wrap items-center gap-2 mb-4">
        {lead.dnc ? <Badge status="Do not call" /> : <Badge status={lead.status} />}
        <ScorePill score={lead.score} />
        <span className="text-xs" style={{ color: C.muted }}>{lead.source}</span>
        <div className="ml-auto flex items-center gap-2">
          <span className="text-xs font-semibold" style={{ color: C.text }}>Do Not Call</span>
          <Toggle on={lead.dnc} onChange={(v) => onUpdate(lead.id, { dnc: v, status: v ? "Do not call" : lead.status })} />
        </div>
      </div>
      <div className="flex gap-1 mb-4 p-1 rounded-xl" style={{ background: C.bg }}>
        {tabs.map(([k, lbl]) => (
          <button key={k} onClick={() => setTab(k)} className="flex-1 rounded-lg py-2 text-sm font-semibold transition-colors"
            style={{ background: tab === k ? "#fff" : "transparent", color: tab === k ? C.ink : C.muted, boxShadow: tab === k ? "0 1px 2px rgba(0,0,0,0.06)" : "none" }}>
            {lbl}
          </button>
        ))}
      </div>

      {tab === "overview" && (
        <div>
          <div className="grid sm:grid-cols-2 gap-x-6 gap-y-2.5 mb-5">
            {info.map(([k, v]) => (
              <div key={k} className="flex justify-between gap-3 py-1.5" style={{ borderBottom: `1px solid ${C.line}` }}>
                <span className="text-xs font-semibold" style={{ color: C.muted }}>{k}</span>
                <span className="text-sm text-right truncate" style={{ color: C.text }}>{v}</span>
              </div>
            ))}
          </div>
          <Field label="Notes">
            <div className="rounded-lg p-3 text-sm" style={{ background: C.bg, color: C.text, minHeight: 56 }}>{lead.notes || "No notes yet."}</div>
          </Field>
          <div className="flex gap-2 mt-3">
            <input value={note} onChange={(e) => setNote(e.target.value)} placeholder="Add a note" className={inputCls} style={inputStyle} />
            <Btn variant="soft" onClick={() => { if (note.trim()) { onUpdate(lead.id, { notes: lead.notes ? lead.notes + " · " + note : note }); setNote(""); } }}>Add</Btn>
          </div>
        </div>
      )}

      {tab === "calls" && (
        <div>
          {leadCalls.length === 0 && <p className="text-sm py-6 text-center" style={{ color: C.faint }}>No calls logged for this lead.</p>}
          {leadCalls.map((c) => (
            <div key={c.id} className="rounded-xl p-3.5 mb-2.5" style={{ background: C.bg }}>
              <div className="flex items-center justify-between mb-1.5">
                <span className="text-xs font-semibold" style={{ color: C.muted }}>{c.datetime} · {c.duration} · {c.mode}</span>
                <Badge status={c.outcome} />
              </div>
              <p className="text-sm" style={{ color: C.text }}>{c.summary}</p>
              {c.objections !== "—" && <p className="text-xs mt-1.5" style={{ color: C.muted }}><b>Objection:</b> {c.objections}</p>}
            </div>
          ))}
        </div>
      )}

      {tab === "comms" && (
        <div>
          <HistoryRow icon={Mail} title="Intro email" sub={lead.email ? "Ready to send to " + lead.email : "No email on file"} badge={lead.catalog === "Sent" ? "Completed" : "Ready"} tone={C.blue} />
          <HistoryRow icon={FileText} title="Catalog / line sheet" sub={lead.catalog === "Sent" ? "Sent" : lead.catalog === "Requested" ? "Requested by store" : "Not sent"} tone={C.gold} />
          <HistoryRow icon={MessageSquare} title="SMS link" sub="Placeholder — sending disabled" tone={C.slate} />
          <div className="flex flex-wrap gap-2 mt-4">
            <Btn variant="goldSoft" size="sm" icon={FileText} onClick={() => onCatalog(lead, "Catalog")}>Send catalog</Btn>
            <Btn variant="ghost" size="sm" icon={DollarSign} onClick={() => onCatalog(lead, "Price list")}>Send price list</Btn>
            <Btn variant="ghost" size="sm" icon={MessageSquare} onClick={() => onCatalog(lead, "SMS link")}>Send SMS</Btn>
          </div>
        </div>
      )}

      {tab === "followup" && (
        <div className="space-y-3">
          <Field label="Next follow-up date">
            <input type="date" value={lead.nextFollowUp} onChange={(e) => onUpdate(lead.id, { nextFollowUp: e.target.value })} className={inputCls} style={inputStyle} />
          </Field>
          <Field label="Follow-up status">
            <div className="flex flex-wrap gap-1.5">
              {["Call again", "Send catalog", "Send price list", "Waiting for reply", "Closed lost", "Closed won"].map((s) => (
                <button key={s} onClick={() => onUpdate(lead.id, { status: s === "Closed won" || s === "Closed lost" ? lead.status : lead.status })}
                  className="rounded-lg px-2.5 py-1.5 text-xs font-semibold" style={{ background: C.bg, color: C.text, border: `1px solid ${C.line}` }}>{s}</button>
              ))}
            </div>
          </Field>
          <Field label="Reminder notes">
            <textarea rows={2} defaultValue={lead.notes} className={inputCls} style={inputStyle} />
          </Field>
        </div>
      )}

      <div className="flex flex-wrap gap-2 mt-6 pt-4" style={{ borderTop: `1px solid ${C.line}` }}>
        <Btn variant="gold" icon={Phone} disabled={lead.dnc} onClick={() => onCall(lead)}>Start AI call</Btn>
        <Btn variant="soft" icon={ThumbsUp} onClick={() => onUpdate(lead.id, { status: "Interested", score: Math.max(lead.score, 80) })}>Mark interested</Btn>
        <Btn variant="soft" icon={Clock} onClick={() => onUpdate(lead.id, { status: "Wants callback" })}>Mark follow-up</Btn>
        <Btn variant="danger" icon={PhoneOff} onClick={() => onUpdate(lead.id, { dnc: true, status: "Do not call" })}>Do not call</Btn>
      </div>
    </Modal>
  );
}

                  </div>
                  <div className="text-xs mt-1" style={{ color: C.muted }}>{v.date} · {v.editedBy}</div>
                  <div className="flex gap-3 mt-2 text-xs" style={{ color: C.muted }}>
                    <span>Answer <b style={{ color: C.text }}>{v.answer}</b></span>

              ))}

}

/* ============================================================
   AI CALLING PANEL  (simulated live call)
   ============================================================ */
const SIM_TRANSCRIPT = [
  { who: "ai", text: "Hi, this is Ava calling on behalf of Jewelar. Is this a good moment for a quick word with whoever handles buying?" },
  { who: "cust", text: "Sure, this is the owner. What's this about?" },
  { who: "ai", text: "Jewelar is a wholesale gold-plated fashion jewelry brand. We supply boutiques with earrings, necklaces and rings at three to four times retail margins." },
  { who: "cust", text: "Interesting. What are your minimums?" },
  { who: "ai", text: "Low minimums — ten pieces per style, mix and match, and free shipping on first orders over a hundred and fifty dollars." },
  { who: "cust", text: "Okay, can you send me a catalog with pricing?" },
  { who: "ai", text: "Absolutely. What's the best email for your line sheet?" },
];
const CALL_OUTCOMES = ["Answered", "No answer", "Busy", "Voicemail", "Interested", "Wants catalog", "Wants callback", "Requested price list", "Requested email", "Not interested", "Do not call", "Wrong number", "Call failed"];

function CallingPanel({ lead, leads, onPickLead, onComplete, compliancePassed }) {
  const [mode, setMode] = useState("AI");
  const [status, setStatus] = useState("Ready");
  const [shown, setShown] = useState(0);
  const [outcome, setOutcome] = useState("");
  const [notes, setNotes] = useState("");
  const timer = useRef(null);
  const active = lead;

  useEffect(() => { setStatus("Ready"); setShown(0); setOutcome(""); setNotes(""); if (timer.current) clearInterval(timer.current); }, [lead]);
  useEffect(() => () => timer.current && clearInterval(timer.current), []);

  const startCall = () => {
    if (!active) return;
    setStatus("Calling"); setShown(0);
    setTimeout(() => {
      setStatus("Connected");
      timer.current = setInterval(() => {
        setShown((n) => {
          if (n >= SIM_TRANSCRIPT.length) { clearInterval(timer.current); setStatus("Completed"); setOutcome("Wants catalog"); return n; }
          return n + 1;
        });
      }, 1100);
    }, 1300);
  };
  const endCall = () => { if (timer.current) clearInterval(timer.current); setStatus("Completed"); if (!outcome) setOutcome("Answered"); };

  if (!active) {
    return (
      <div>
        <SectionTitle title="Calling Panel" sub="Select a lead to begin" />
        <Card>
          <p className="text-sm mb-3" style={{ color: C.muted }}>Choose a store to call:</p>
          <div className="grid sm:grid-cols-2 gap-2">
            {leads.filter((l) => !l.dnc).slice(0, 8).map((l) => (
              <button key={l.id} onClick={() => onPickLead(l.id)} className="text-left rounded-xl p-3 hover:shadow-sm transition-shadow" style={{ background: C.bg, border: `1px solid ${C.line}` }}>
                <div className="font-semibold text-sm" style={{ color: C.text }}>{l.name}</div>
                <div className="text-xs" style={{ color: C.muted }}>{l.phone}</div>
              </button>
            ))}
          </div>
        </Card>
      </div>
    );
  }

  const statusTone = { Ready: C.slate, Calling: C.amber, Connected: C.green, Completed: C.blue, Failed: C.red }[status];
  const transcript = SIM_TRANSCRIPT.slice(0, shown);
  const lastCust = [...transcript].reverse().find((t) => t.who === "cust");
  const lastAi = [...transcript].reverse().find((t) => t.who === "ai");

  return (
    <div>
      <SectionTitle title="Calling Panel" sub={active.name} right={<Btn variant="ghost" size="sm" onClick={() => onPickLead(null)}>Change lead</Btn>} />
      {!compliancePassed && (
        <div className="rounded-xl p-3 mb-4 flex items-center gap-2.5" style={{ background: C.amberBg }}>
          <AlertTriangle size={16} style={{ color: C.amber }} />
          <span className="text-sm" style={{ color: C.amber }}>Compliance checklist not confirmed. Complete it in the Compliance tab before live calling.</span>
        </div>
      )}
      <div className="grid lg:grid-cols-3 gap-5">
        {/* Left: call control */}
        <Card>
          <div className="text-center pb-4 mb-4" style={{ borderBottom: `1px solid ${C.line}` }}>
            <div className="mx-auto grid place-items-center rounded-full mb-3" style={{ width: 64, height: 64, background: C.goldSoft }}>
              <Building2 size={26} style={{ color: C.gold }} />
            </div>
            <div className="font-semibold" style={{ color: C.text }}>{active.name}</div>
            <div className="text-sm" style={{ color: C.muted }}>{active.phone}</div>
            <div className="inline-flex items-center gap-1.5 mt-2 rounded-full px-3 py-1 text-xs font-semibold" style={{ background: C.bg, color: statusTone }}>
              <CircleDot size={11} /> {status}
            </div>
          </div>
          <div className="mb-4">
            <div className="text-xs font-semibold mb-1.5" style={{ color: C.text }}>Script</div>
            <div className="rounded-lg px-3 py-2 text-sm" style={{ background: C.bg, color: C.text }}>Standard Wholesale Intro v3</div>
          </div>
          <div className="mb-4">
            <div className="text-xs font-semibold mb-1.5" style={{ color: C.text }}>Call mode</div>
            <div className="flex gap-1.5">
              {["AI", "Human", "Test"].map((m) => (
                <button key={m} onClick={() => setMode(m)} className="flex-1 rounded-lg py-2 text-xs font-semibold" style={{ background: mode === m ? C.ink : "#fff", color: mode === m ? "#fff" : C.muted, border: `1px solid ${mode === m ? C.ink : C.line}` }}>{m}</button>
              ))}
            </div>
          </div>
          <div className="space-y-2">
            {(status === "Ready" || status === "Completed") && <Btn variant="gold" size="lg" icon={Phone} className="w-full" onClick={startCall}>{status === "Completed" ? "Call again" : "Start AI call"}</Btn>}
            {(status === "Calling" || status === "Connected") && <>
              <Btn variant="ghost" size="lg" icon={PhoneForwarded} className="w-full" onClick={() => setMode("Human")}>Transfer to human</Btn>
              <Btn variant="danger" size="lg" icon={PhoneOff} className="w-full" onClick={endCall}>End call</Btn>
            </>}
          </div>
        </Card>

        {/* Middle: live transcript */}
        <Card pad={false} className="lg:col-span-2 flex flex-col" style={{ minHeight: 460 }}>
          <div className="px-5 py-3 flex items-center justify-between" style={{ borderBottom: `1px solid ${C.line}` }}>
            <div className="flex items-center gap-2"><Mic size={15} style={{ color: status === "Connected" ? C.green : C.muted }} /><h3 className="font-semibold text-sm" style={{ color: C.text }}>Live transcript</h3></div>
            {status === "Connected" && <span className="text-xs font-semibold inline-flex items-center gap-1.5" style={{ color: C.green }}><span className="rounded-full" style={{ width: 7, height: 7, background: C.green }} /> Recording</span>}
          </div>
          <div className="flex-1 p-4 space-y-3 overflow-y-auto" style={{ maxHeight: 300 }}>
            {transcript.length === 0 && <p className="text-sm text-center py-16" style={{ color: C.faint }}>Transcript will appear here once the call connects.</p>}
            {transcript.map((t, i) => (
              <div key={i} className={`flex ${t.who === "ai" ? "justify-start" : "justify-end"}`}>
                <div className="rounded-2xl px-3.5 py-2 text-sm" style={{ maxWidth: "80%", background: t.who === "ai" ? C.bg : C.ink, color: t.who === "ai" ? C.text : "#fff" }}>
                  <div className="text-xs font-semibold mb-0.5" style={{ color: t.who === "ai" ? C.gold : "#C9C6CF" }}>{t.who === "ai" ? "AI · Ava" : "Customer"}</div>
                  {t.text}
                </div>
              </div>
            ))}
          </div>
          <div className="grid sm:grid-cols-2 gap-3 p-4" style={{ borderTop: `1px solid ${C.line}` }}>
            <div className="rounded-lg p-3" style={{ background: C.bg }}>
              <div className="text-xs font-semibold mb-1" style={{ color: C.gold }}>AI response</div>
              <p className="text-xs" style={{ color: C.text }}>{lastAi ? lastAi.text : "—"}</p>
            </div>
            <div className="rounded-lg p-3" style={{ background: C.bg }}>
              <div className="text-xs font-semibold mb-1" style={{ color: C.muted }}>Customer response</div>
              <p className="text-xs" style={{ color: C.text }}>{lastCust ? lastCust.text : "—"}</p>
            </div>
          </div>
        </Card>
      </div>

      {/* Outcome capture */}
      {status === "Completed" && (
        <Card className="mt-5">
          <h3 className="font-semibold mb-3" style={{ color: C.text }}>Save call outcome</h3>
          <div className="grid lg:grid-cols-3 gap-4">
            <Field label="Call outcome">
              <select value={outcome} onChange={(e) => setOutcome(e.target.value)} className={inputCls} style={inputStyle}>
                <option value="">Select outcome</option>
                {CALL_OUTCOMES.map((o) => <option key={o}>{o}</option>)}
              </select>
            </Field>
            <Field label="Call summary">
              <input defaultValue="Owner requested catalog and pricing." className={inputCls} style={inputStyle} />
            </Field>
            <Field label="Next follow-up date"><input type="date" className={inputCls} style={inputStyle} /></Field>
          </div>
          <div className="mt-3"><Field label="Call notes"><textarea rows={2} value={notes} onChange={(e) => setNotes(e.target.value)} placeholder="Objections, next action, anything to remember" className={inputCls} style={inputStyle} /></Field></div>
          <div className="flex gap-2 mt-4">
            <Btn variant="gold" icon={Save} onClick={() => onComplete(active, outcome || "Answered", notes)}>Save call notes</Btn>
            <Btn variant="ghost" onClick={() => { setStatus("Ready"); setShown(0); }}>Discard</Btn>
          </div>
        </Card>
      )}
    </div>
  );
}

function TestCallPage({ tests, setTests }) {
  const [phone, setPhone] = useState("");
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const [rating, setRating] = useState("");
  const [improve, setImprove] = useState("");
  const startManualTestCall = () => {
    if (!phone) return;
    setRunning(true); setDone(false);
    setTimeout(() => { setRunning(false); setDone(true); }, 1600);
  };
  const saveTest = () => {
    setTests([{ id: Date.now(), datetime: "2026-06-24 now", script: "Standard Wholesale Intro v3", voice: "Ava (warm)", scenario: "Manual test", rating: rating || "Good", improve }, ...tests]);
    setDone(false); setRating(""); setImprove(""); setPhone("");
  };
  return (
    <div>
      <SectionTitle title="Test AI Call" sub="Call your own phone to hear the AI and refine the script" />
      <div className="rounded-xl p-3 mb-5 flex items-center gap-2.5" style={{ background: C.blueBg }}>
        <Phone size={16} style={{ color: C.blue }} />
        <span className="text-sm" style={{ color: C.blue }}>Test calls are never saved as leads. They are flagged TEST and kept separately.</span>
      </div>
      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="font-semibold mb-4" style={{ color: C.text }}>Start a test call</h3>
          <div className="space-y-4">
            <Field label="My test phone number" hint="The AI will call this number so you can speak with it."><input value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="(305) 555-0000" className={inputCls} style={inputStyle} /></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Select script"><select className={inputCls} style={inputStyle}><option>Standard Wholesale Intro v3</option><option>Short Intro v1</option></select></Field>
              <Field label="Select voice"><select className={inputCls} style={inputStyle}><option>Ava (warm)</option><option>Noah (neutral)</option><option>Mia (bright)</option></select></Field>
            </div>
            <Field label="Test scenario notes"><textarea rows={2} placeholder="What do you want to test on this call?" className={inputCls} style={inputStyle} /></Field>
            <Btn variant="gold" size="lg" icon={Phone} className="w-full" disabled={running} onClick={startManualTestCall}>{running ? "Calling your phone…" : "Start test call"}</Btn>
          </div>

          {done && (
            <div className="mt-5 pt-5" style={{ borderTop: `1px solid ${C.line}` }}>
              <h4 className="font-semibold mb-3" style={{ color: C.text }}>Rate this test</h4>
              <div className="flex gap-2 mb-3">
                {[["Good", C.green, C.greenBg], ["Needs improvement", C.amber, C.amberBg], ["Bad", C.red, C.redBg]].map(([r, fg, bg]) => (
                  <button key={r} onClick={() => setRating(r)} className="rounded-lg px-3 py-2 text-xs font-semibold" style={{ background: rating === r ? fg : bg, color: rating === r ? "#fff" : fg }}>{r}</button>
                ))}
              </div>
              <Field label="What should the AI improve?"><textarea rows={2} value={improve} onChange={(e) => setImprove(e.target.value)} className={inputCls} style={inputStyle} /></Field>
              <div className="mt-3"><Btn variant="primary" icon={Save} onClick={saveTest}>Save test result</Btn></div>
            </div>
          )}
        </Card>

        <Card pad={false}>
          <div className="px-5 py-3" style={{ borderBottom: `1px solid ${C.line}` }}><h3 className="font-semibold text-sm" style={{ color: C.text }}>Test history</h3></div>
          <div className="p-3 space-y-2.5">

              return (
                <div key={t.id} className="rounded-xl p-3.5" style={{ background: C.bg }}>

                    <span className="text-xs font-semibold" style={{ color: C.muted }}>{t.datetime} · {t.voice}</span>

                  </div>
                  <div className="text-sm font-medium" style={{ color: C.text }}>{t.script}</div>
                  {t.improve && <p className="text-xs mt-1" style={{ color: C.muted }}><b>Improve:</b> {t.improve}</p>}
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}

                <div key={d} className="flex items-center justify-between rounded-lg px-3 py-2" style={{ background: d === today ? C.goldSoft : C.bg }}>
                  <span className="text-sm" style={{ color: C.text, fontWeight: d === today ? 600 : 400 }}>{d}{d === today ? " · today" : ""}</span>
                  <span className="text-xs font-semibold rounded-full px-2 py-0.5" style={{ background: c ? C.ink : "transparent", color: c ? "#fff" : C.faint }}>{c || "—"}</span>
                </div>
              );
            })}
          </div>
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   CATALOG & EMAIL PLACEHOLDER
   ============================================================ */
function CatalogPanel({ requireApproval, setRequireApproval, onSend }) {
  const items = [
    ["Catalog", "Full wholesale line sheet with pricing", FileText],
    ["Price list", "Wholesale prices with retail margins", DollarSign],
    ["Intro email", "First-touch introduction to Jewelar", Mail],
    ["Follow-up email", "Re-engage a lead who went quiet", Send],
    ["SMS link", "Text a link to the catalog", MessageSquare],
  ];
  return (
    <div>
      <SectionTitle title="Catalog & Email" sub="Send materials to leads — placeholder, no real sending yet" />
      <div className="rounded-xl p-3.5 mb-5 flex items-center justify-between gap-3 flex-wrap" style={{ background: C.card, border: `1px solid ${C.line}` }}>
        <div className="flex items-center gap-2.5">
          <ShieldCheck size={18} style={{ color: C.gold }} />
          <div><div className="text-sm font-semibold" style={{ color: C.text }}>Require my approval before sending</div><div className="text-xs" style={{ color: C.muted }}>Nothing goes out until you confirm</div></div>
        </div>
        <Toggle on={requireApproval} onChange={setRequireApproval} />
      </div>
      <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-4">
        {items.map(([t, sub, Icon]) => (
          <Card key={t}>
            <div className="grid place-items-center rounded-xl mb-3" style={{ width: 44, height: 44, background: C.goldSoft }}><Icon size={20} style={{ color: C.gold }} /></div>
            <div className="font-semibold" style={{ color: C.text }}>{t}</div>
            <p className="text-sm mt-1 mb-4" style={{ color: C.muted }}>{sub}</p>
            <Btn variant="ghost" size="sm" icon={Send} onClick={() => onSend(t)}>Send {t.toLowerCase()}</Btn>
          </Card>
        ))}
      </div>
    </div>
  );
}

/* ============================================================
   REPORTS
   ============================================================ */
function Bar({ label, value, max, color }) {
  return (
    <div className="mb-3">
      <div className="flex justify-between text-xs mb-1"><span style={{ color: C.text, fontWeight: 500 }}>{label}</span><span style={{ color: C.muted }}>{value}</span></div>
      <div className="rounded-full overflow-hidden" style={{ height: 8, background: C.bg }}><div className="h-full rounded-full" style={{ width: `${(value / max) * 100}%`, background: color }} /></div>
    </div>
  );
}
function ReportsPage({ leads, calls }) {
  const byStatus = {};
  calls.forEach((c) => (byStatus[c.outcome] = (byStatus[c.outcome] || 0) + 1));
  const maxStatus = Math.max(...Object.values(byStatus), 1);
  const answered = calls.filter((c) => !["No answer", "Busy", "Voicemail", "Call failed"].includes(c.outcome)).length;
  const metrics = [
    { label: "Answer rate", value: Math.round((answered / calls.length) * 100) + "%", icon: PhoneIncoming, tone: "blue" },
    { label: "Interest rate", value: Math.round((leads.filter((l) => l.status === "Interested").length / leads.length) * 100) + "%", icon: ThumbsUp, tone: "green" },
    { label: "Catalog request rate", value: Math.round((leads.filter((l) => l.catalog !== "—").length / leads.length) * 100) + "%", icon: FileText, tone: "gold" },
    { label: "Callback rate", value: Math.round((leads.filter((l) => l.status === "Wants callback").length / leads.length) * 100) + "%", icon: Clock, tone: "amber" },
    { label: "Do Not Call", value: leads.filter((l) => l.dnc).length, icon: PhoneOff, tone: "red" },
    { label: "Follow-ups due today", value: leads.filter((l) => l.nextFollowUp === "2026-06-24").length, icon: CalendarClock, tone: "ink" },
  ];
  const tones = { green: C.green, red: C.red, amber: C.amber, blue: C.blue, gold: C.gold, ink: C.ink };
  return (
    <div>
      <SectionTitle title="Reports" sub="Outreach performance overview" />
      <div className="grid grid-cols-2 lg:grid-cols-3 gap-3 mb-5">
        {metrics.map((m) => <StatCard key={m.label} {...m} />)}
      </div>
      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="font-semibold mb-4" style={{ color: C.text }}>Calls by status</h3>
          {Object.entries(byStatus).sort((a, b) => b[1] - a[1]).map(([s, v]) => (
            <Bar key={s} label={s} value={v} max={maxStatus} color={tones[STATUS_TONE[s]] || C.slate} />
          ))}
        </Card>
        <Card>
          <h3 className="font-semibold mb-4" style={{ color: C.text }}>Best performing script</h3>
          <div className="rounded-xl p-4 mb-3" style={{ background: C.goldSoft, border: `1px solid ${C.goldLine}` }}>
            <div className="flex items-center justify-between"><span className="font-semibold" style={{ color: C.ink }}>Standard Wholesale Intro v3</span><Star size={16} fill={C.gold} style={{ color: C.gold }} /></div>
            <div className="flex gap-4 mt-2 text-xs" style={{ color: C.muted }}>
              <span>Answer <b style={{ color: C.text }}>41%</b></span><span>Interest <b style={{ color: C.text }}>27%</b></span><span>Catalog <b style={{ color: C.text }}>19%</b></span>
            </div>
          </div>
          <Bar label="v3 interest rate" value={27} max={30} color={C.green} />
          <Bar label="v2 interest rate" value={22} max={30} color={C.slate} />
          <Bar label="v1 interest rate" value={18} max={30} color={C.slate} />
        </Card>
      </div>
    </div>
  );
}

/* ============================================================
   SETTINGS
   ============================================================ */

        <Card>
          <h3 className="font-semibold mb-3" style={{ color: C.text }}>Connection status</h3>
          {[["Twilio (AI calling)", false], ["Google Maps (search)", false], ["Email / SMS sending", false]].map(([s, on]) => (
            <div key={s} className="flex items-center justify-between py-2.5" style={{ borderBottom: `1px solid ${C.line}` }}>
              <span className="text-sm" style={{ color: C.text }}>{s}</span>
              <span className="inline-flex items-center gap-1.5 text-xs font-semibold rounded-full px-2.5 py-1" style={{ background: C.slateBg, color: C.slate }}><CircleDot size={11} /> Placeholder</span>
            </div>
          ))}
          <p className="text-xs mt-3" style={{ color: C.faint }}>Integrations are mocked. No live Twilio, Maps, email, or SMS is connected.</p>
        </Card>

/* ============================================================
   TOAST
   ============================================================ */
function Toast({ msg }) {
  if (!msg) return null;
  return (
    <div className="fixed bottom-5 left-1/2 -translate-x-1/2 rounded-xl px-4 py-2.5 text-sm font-medium flex items-center gap-2 shadow-lg"
      style={{ zIndex: 60, background: C.ink, color: "#fff" }}>
      <CheckCircle2 size={16} style={{ color: C.gold }} /> {msg}
    </div>
  );
}

/* ============================================================
   ROOT APP  — state + placeholder functions + router
   ============================================================ */
function App() {
  const [view, setView] = useState("dashboard");
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [leads, setLeads] = useState(MOCK_LEADS);
  const [calls, setCalls] = useState(MOCK_CALLS);
  const [tests, setTests] = useState(MOCK_TEST_CALLS);
  const [script, setScript] = useState(buildDefaultScript());
  const [versions, setVersions] = useState(MOCK_SCRIPT_VERSIONS);
  const [openLeadId, setOpenLeadId] = useState(null);
  const [callLeadId, setCallLeadId] = useState(null);
  const [toast, setToast] = useState("");
  const [requireApproval, setRequireApproval] = useState(true);
  const [compChecks, setCompChecks] = useState(COMPLIANCE_ITEMS.map(() => false));
  const [compSettings, setCompSettings] = useState({ aiDisc: true, recDisc: true, approval: true, autostop: true });

  const compliancePassed = compChecks.every(Boolean);
  const flash = (m) => { setToast(m); setTimeout(() => setToast(""), 2600); };
  const openLead = (id) => setOpenLeadId(id);
  const activeLead = leads.find((l) => l.id === openLeadId) || null;
  const callLead = leads.find((l) => l.id === callLeadId) || null;

  /* ---- placeholder functions (as specified) ---- */
  const updateLeadStatus = (id, patch) => {
    if (id === "__add__") { flash("Add-lead form is a placeholder in this demo"); return; }
    setLeads((ls) => ls.map((l) => (l.id === id ? { ...l, ...patch } : l)));
    flash("Lead updated");
  };
  const startTwilioAICall = (lead) => { setCallLeadId(lead.id); setView("calling"); setOpenLeadId(null); };
  const saveCallLog = (lead, outcome, notes) => {
    const newCall = { id: Date.now(), leadId: lead.id, store: lead.name, phone: lead.phone, datetime: "2026-06-24 now", duration: "3:40", outcome, objections: "—", summary: "Call completed via AI agent.", nextFollowUp: "2026-06-27", notes, mode: "AI" };
    setCalls((cs) => [newCall, ...cs]);
    setLeads((ls) => ls.map((l) => (l.id === lead.id ? { ...l, status: outcome, lastCall: "2026-06-24", dnc: outcome === "Do not call" ? true : l.dnc } : l)));
    flash("Call log saved");
    setView("history");
  };
  const sendCatalogEmail = (lead, kind) => flash(requireApproval ? `${kind} queued — awaiting your approval` : `${kind} sent (placeholder)`);
  const sendSMS = (kind) => flash(`${kind} is a placeholder — no real sending`);
  const saveScriptVersion = (action) => {
    if (action === "save") { const nv = versions[0].v + 1; setVersions([{ v: nv, date: "2026-06-24", editedBy: "Stav", answer: "—", interest: "—", note: "Current" }, ...versions.map((x) => ({ ...x, note: x.note === "Current" ? "Previous" : x.note }))]); flash(`Saved as version ${nv}`); }
    else if (action === "duplicate") flash("Script duplicated");
    else if (action === "restore") { setScript(buildDefaultScript()); flash("Restored previous version"); }
  };
  const addLeadToCRM = (r) => {
    setLeads((ls) => [...ls, { id: Date.now(), name: r.name, phone: r.phone, email: "", website: r.website, address: r.address, rating: r.rating, source: "Google Maps", status: "New", lastCall: "", nextFollowUp: "", score: 60, dnc: false, catalog: "—", notes: "" }]);
    flash(`${r.name} added to CRM`);
  };

  const addedNames = leads.map((l) => l.name);

  return (
    <div className="min-h-screen flex" style={{ background: C.bg, fontFamily: SANS, color: C.text }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');
        *{box-sizing:border-box} body{margin:0} ::-webkit-scrollbar{width:8px;height:8px} ::-webkit-scrollbar-thumb{background:#ddd6c9;border-radius:4px}`}</style>

      <Sidebar view={view} setView={setView} open={sidebarOpen} setOpen={setSidebarOpen} />

      <div className="flex-1 min-w-0 flex flex-col">
        <Topbar onMenu={() => setSidebarOpen(true)} onTest={() => setView("test")} />
        <main className="flex-1 p-4 lg:p-7 w-full mx-auto" style={{ maxWidth: 1400 }}>
          {view === "dashboard" && <Dashboard leads={leads} calls={calls} setView={setView} openLead={openLead} />}
          {view === "leads" && <LeadTable leads={leads} openLead={openLead} onCall={startTwilioAICall} onUpdate={updateLeadStatus} />}
          {view === "map" && <MapSearch onAdd={addLeadToCRM} addedNames={addedNames} />}
          {view === "scripts" && <ScriptEditor script={script} setScript={setScript} versions={versions} onSaveVersion={saveScriptVersion} />}
          {view === "calling" && <CallingPanel lead={callLead} leads={leads} onPickLead={setCallLeadId} onComplete={saveCallLog} compliancePassed={compliancePassed} />}
          {view === "history" && <CallHistory calls={calls} openLead={openLead} />}
          {view === "followups" && <FollowUpPanel leads={leads} openLead={openLead} onUpdate={updateLeadStatus} />}
          {view === "catalog" && <CatalogPanel requireApproval={requireApproval} setRequireApproval={setRequireApproval} onSend={sendSMS} />}
          {view === "compliance" && <ComplianceChecklist checks={compChecks} setChecks={setCompChecks} settings={compSettings} setSettings={setCompSettings} passed={compliancePassed} />}
          {view === "reports" && <ReportsPage leads={leads} calls={calls} />}
          {view === "settings" && <SettingsPage />}
          {view === "test" && <TestCallPage tests={tests} setTests={setTests} />}
        </main>
      </div>

      <LeadDetails lead={activeLead} calls={calls} onClose={() => setOpenLeadId(null)} onCall={startTwilioAICall} onUpdate={updateLeadStatus} onCatalog={sendCatalogEmail} />
      <Toast msg={toast} />
    </div>
  );
}

createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
